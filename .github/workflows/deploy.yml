name: PharmaForge OS - Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: "Deploy to ${{ github.event.inputs.environment }}"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets-check
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [[ "$ENV" == "staging" ]]; then
            if [[ -z "${{ secrets.STAGING_DEPLOY_KEY }}" ]]; then
              echo "STAGING_DEPLOY_KEY is not configured. Skipping deploy."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          elif [[ "$ENV" == "production" ]]; then
            if [[ -z "${{ secrets.PRODUCTION_DEPLOY_KEY }}" ]]; then
              echo "PRODUCTION_DEPLOY_KEY is not configured. Skipping deploy."
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Deploy
        if: steps.secrets-check.outputs.skip != 'true'
        run: |
          echo "Deploying to ${{ github.event.inputs.environment }}..."
          # TODO: Add real deploy commands here
          echo "Deployment placeholder complete."

      - name: Skip notice
        if: steps.secrets-check.outputs.skip == 'true'
        run: |
          echo "Deploy skipped — required secrets are not configured."
          echo "Set the appropriate deploy key in Settings > Secrets to enable deployment."
